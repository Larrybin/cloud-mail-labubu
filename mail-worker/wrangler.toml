name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-03-10"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"			#d1数据库绑定名默认不可修改
database_name = "cloud-mail"		#d1数据库名字
database_id = "1bcdd0b1-a4c3-468c-a569-4e57b5ef2330"		#d1数据库id

[[kv_namespaces]]
binding = "kv"			#kv绑定名默认不可修改
id = "1063d837cdd64035a837b9ec75d5dae7"					#kv数据库id

[[r2_buckets]]
binding = "r2"			#r2对象存储绑定名默认不可修改
bucket_name = "cloud-mail"		#r2对象存储桶的名字
# 说明：/api/form/file 与 /api/form/submit(含附件) 依赖 r2 绑定

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#定时任务每天晚上12点执行


[vars]
orm_log = false
domain = ["backwardstextgenerator.com"]				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
admin = "admin@backwardstextgenerator.com"				#管理员的邮箱	示例: admin@example.com
jwt_secret = "C3BF778A-2703-4D70-B626-C1657BA45413"			#jwt令牌的密钥,随便填一串字符串
FORM_API_TOKEN = "8E0FCA92-1A13-4E9C-A2A9-25DF88E65C23"		#/api/form/* 专用服务间令牌（Bearer）
FORM_TENANT_KEYRING = "{\"v1\":\"ph1yl+OrD3Mu7cXu8VMVuFdUZ5JOSfLGr0QkGgHG6mI=\"}"	#/api/form/submit 多租户密钥环（JSON：{kid:base64Key}）
FORM_FILE_TTL_SECONDS = "604800"	#/api/form/file 下载签名有效期（秒）
INIT_HTTP_ENABLED = "false"	#/api/init/:secret 是否开启（生产建议保持 false）
PUBLIC_TOKEN_TTL_SECONDS = "86400"	#/api/public/genToken 令牌有效期（秒）
CORS_ADMIN_ALLOWED_ORIGINS = ""	#管理接口允许的跨域 Origin（逗号分隔）
CORS_PUBLIC_ALLOWED_ORIGINS = ""	#/api/public/* 与 /api/form/* 允许的跨域 Origin（逗号分隔）

# secrets（通过 wrangler secret put 管理）:
# - FORM_FILE_SECRET      # /api/form/file 下载签名密钥

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
